<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水族馆溶氧泵与隔离转移登记系统</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 24px 32px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #1a1a2e;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .nav-tabs {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }

        .nav-tab {
            padding: 10px 24px;
            border: none;
            background: #f0f0f0;
            color: #666;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-tab:hover {
            background: #e0e0e0;
        }

        .nav-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .content {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .status-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .status-card {
            padding: 24px;
            border-radius: 12px;
            color: white;
            text-align: center;
        }

        .status-card.green {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .status-card.orange {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .status-card.red {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }

        .status-card .number {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .status-card .label {
            font-size: 14px;
            opacity: 0.9;
        }

        .pools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .pool-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .pool-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .pool-card.maintenance {
            border-left-color: #f5576c;
            background: #fff5f5;
        }

        .pool-card.isolation-full {
            border-left-color: #ff9f43;
            background: #fff8e6;
        }

        .pool-card.isolation {
            border-left-color: #10ac84;
        }

        .pool-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .pool-number {
            font-size: 20px;
            font-weight: bold;
            color: #1a1a2e;
        }

        .pool-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-normal {
            background: #d4edda;
            color: #155724;
        }

        .badge-maintenance {
            background: #f8d7da;
            color: #721c24;
        }

        .badge-isolation {
            background: #d1ecf1;
            color: #0c5460;
        }

        .badge-full {
            background: #ffeeba;
            color: #856404;
        }

        .pool-info {
            display: grid;
            gap: 8px;
            font-size: 13px;
            color: #555;
        }

        .pool-info div {
            display: flex;
            justify-content: space-between;
        }

        .pool-info span:last-child {
            font-weight: 500;
            color: #1a1a2e;
        }

        .progress-bar {
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .progress-fill.warning {
            background: linear-gradient(90deg, #f5576c 0%, #eb3349 100%);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
        }

        .btn-outline:hover {
            background: #667eea;
            color: white;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .detail-panel {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid #e9ecef;
        }

        .detail-title {
            font-size: 22px;
            font-weight: bold;
            color: #1a1a2e;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .detail-item {
            background: white;
            padding: 16px;
            border-radius: 8px;
        }

        .detail-item .label {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
        }

        .detail-item .value {
            font-size: 18px;
            font-weight: bold;
            color: #1a1a2e;
        }

        .chart-container {
            height: 350px;
            margin-bottom: 24px;
        }

        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #e9ecef;
        }

        .timeline-item {
            position: relative;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -26px;
            top: 18px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #667eea;
            border: 2px solid white;
            box-shadow: 0 0 0 2px #667eea;
        }

        .timeline-item.out::before {
            background: #f5576c;
            box-shadow: 0 0 0 2px #f5576c;
        }

        .timeline-item.in::before {
            background: #38ef7d;
            box-shadow: 0 0 0 2px #38ef7d;
        }

        .timeline-time {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
        }

        .timeline-content {
            font-size: 14px;
            color: #333;
        }

        .timeline-reason {
            font-size: 13px;
            color: #666;
            margin-top: 4px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 22px;
            font-weight: bold;
            color: #1a1a2e;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }

        .form-group select,
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-group select:focus,
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .alert {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .alert-success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th,
        .table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #e9ecef;
        }

        .table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
            font-size: 13px;
        }

        .table td {
            font-size: 14px;
            color: #555;
        }

        .table tr:hover {
            background: #f8f9fa;
        }

        .maintenance-list {
            display: grid;
            gap: 16px;
        }

        .maintenance-item {
            background: #fff5f5;
            border: 1px solid #f5c6cb;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .maintenance-info h4 {
            color: #721c24;
            margin-bottom: 8px;
        }

        .maintenance-info p {
            color: #999;
            font-size: 13px;
        }

        .section-title {
            font-size: 20px;
            font-weight: bold;
            color: #1a1a2e;
            margin-bottom: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #667eea;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 20px;
            background: none;
            border: none;
        }

        .back-btn:hover {
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .action-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .oxygen-warning {
            display: inline-block;
            padding: 2px 8px;
            background: #f8d7da;
            color: #721c24;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 8px;
        }

        .oxygen-normal {
            display: inline-block;
            padding: 2px 8px;
            background: #d4edda;
            color: #155724;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 8px;
        }

        .nav-tab-wrapper {
            position: relative;
            display: inline-flex;
            align-items: center;
        }

        .nav-tab-alert-dot {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 10px;
            height: 10px;
            background: #f5576c;
            border-radius: 50%;
            animation: pulse 2s infinite;
            box-shadow: 0 0 0 3px rgba(245, 87, 108, 0.3);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }

        .comparison-selector {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .selector-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .selector-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a2e;
        }

        .selector-hint {
            font-size: 13px;
            color: #666;
        }

        .pool-selector-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .pool-select-item {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            font-size: 13px;
        }

        .pool-select-item:hover {
            border-color: #667eea;
            background: #f0f2ff;
        }

        .pool-select-item.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .pool-select-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pool-select-item.disabled:hover {
            border-color: #e9ecef;
            background: white;
        }

        .comparison-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .comparison-card {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .comparison-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
        }

        .comparison-card.alert {
            border-color: #f5576c;
            background: linear-gradient(135deg, #fff5f5 0%, #ffe8e8 100%);
            animation: cardPulse 3s ease-in-out infinite;
        }

        @keyframes cardPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(245, 87, 108, 0.2); }
            50% { box-shadow: 0 0 0 8px rgba(245, 87, 108, 0); }
        }

        .comparison-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e9ecef;
        }

        .comparison-pool-number {
            font-size: 24px;
            font-weight: bold;
            color: #1a1a2e;
        }

        .comparison-card.alert .comparison-pool-number {
            color: #721c24;
        }

        .comparison-alert-badge {
            position: absolute;
            top: 0;
            right: 0;
            background: #f5576c;
            color: white;
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 600;
            border-bottom-left-radius: 12px;
        }

        .comparison-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .comparison-info-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
        }

        .comparison-card.alert .comparison-info-item {
            background: rgba(255, 255, 255, 0.8);
        }

        .comparison-info-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
        }

        .comparison-info-value {
            font-size: 18px;
            font-weight: bold;
            color: #1a1a2e;
        }

        .comparison-info-value.alert {
            color: #f5576c;
        }

        .comparison-chart-container {
            height: 220px;
            background: white;
            border-radius: 8px;
            padding: 8px;
        }

        .comparison-card.alert .comparison-chart-container {
            background: rgba(255, 255, 255, 0.8);
        }

        .comparison-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .saved-combinations {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .saved-combinations-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .saved-combinations-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a2e;
        }

        .saved-combinations-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 12px;
        }

        .saved-combination-item {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .saved-combination-item:hover {
            border-color: #667eea;
        }

        .saved-combination-info {
            flex: 1;
            min-width: 0;
        }

        .saved-combination-name {
            font-weight: 600;
            color: #1a1a2e;
            font-size: 14px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .saved-combination-pools {
            font-size: 12px;
            color: #666;
        }

        .saved-combination-actions {
            display: flex;
            gap: 6px;
            margin-left: 8px;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            background: #f0f0f0;
        }

        .icon-btn.delete:hover {
            background: #f8d7da;
            color: #721c24;
        }

        .empty-comparison {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            background: #f8f9fa;
            border-radius: 16px;
        }

        .empty-comparison-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .empty-comparison-text {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .empty-comparison-hint {
            font-size: 13px;
            color: #666;
        }

        .time-axis-indicator {
            text-align: center;
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 16px;
            display: inline-block;
        }

        .time-axis-container {
            text-align: center;
            margin-bottom: 16px;
        }

        .low-oxygen-legend {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px;
            background: rgba(245, 87, 108, 0.1);
            border: 1px solid rgba(245, 87, 108, 0.3);
            border-radius: 4px;
            font-size: 12px;
            color: #721c24;
            margin-left: 12px;
        }

        .low-oxygen-legend-color {
            width: 20px;
            height: 8px;
            background: linear-gradient(90deg, #f5576c, #eb3349);
            border-radius: 2px;
        }

        .comparison-card-remove {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 10;
        }

        .comparison-card:hover .comparison-card-remove {
            opacity: 1;
        }

        .comparison-card-remove:hover {
            background: #f5576c;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="app-container">
            <div class="header">
                <h1>🐠 水族馆溶氧泵与隔离转移登记系统</h1>
                <p>实时监控溶氧状态 · 智能管理鱼病隔离 · 自动触发检修告警</p>
                <div class="nav-tabs">
                    <button class="nav-tab" :class="{ active: currentView === 'overview' }" @click="switchView('overview')">池位总览</button>
                    <button class="nav-tab" :class="{ active: currentView === 'maintenance' }" @click="switchView('maintenance')">待检修待办</button>
                    <button class="nav-tab" :class="{ active: currentView === 'transfers' }" @click="switchView('transfers')">转移记录</button>
                    <div class="nav-tab-wrapper">

                            required
                        ></textarea>

                            {{ submittingTransfer ? '提交中...' : '提交登记' }}

    <script>
        const { createApp, ref, computed, onMounted, watch, nextTick } = Vue;

        const API_BASE = '/api';

        createApp({
            setup() {
                const loading = ref(true);
                const currentView = ref('overview');
                const previousView = ref('overview');
                const pools = ref([]);
                const statusSummary = ref({ normal_count: 0, maintenance_count: 0, isolation_full_count: 0, total_pools: 0 });
                const maintenancePools = ref([]);
                const transferRecords = ref([]);
                const oxygenReadings = ref({});
                const selectedPool = ref(null);
                const poolDetail = ref(null);
                const showTransferModal = ref(false);
                const submittingTransfer = ref(false);
                const transferAlert = ref(null);
                const oxygenChart = ref(null);
                let chartInstance = null;

                const selectedComparisonPoolIds = ref([]);
                const savedCombinations = ref([]);
                const comparisonChartRefs = ref({});
                const comparisonChartInstances = ref({});
                const maxSavedCombinations = 3;
                const STORAGE_KEY_COMPARISON = 'aquarium_comparison_selection';
                const STORAGE_KEY_COMBINATIONS = 'aquarium_saved_combinations';

                const transferForm = ref({
                    source_pool_id: '',
                    target_pool_id: '',
                    fish_count: 1,
                    reason: '疾病隔离'
                });

                const displayPools = computed(() => pools.value.filter(p => !p.is_isolation));
                const isolationPools = computed(() => pools.value.filter(p => p.is_isolation));

                const availableSourcePools = computed(() =>
                    pools.value.filter(p => !p.is_isolation && p.current_count > 0)
                );

                const maxTransferCount = computed(() => {
                    const source = pools.value.find(p => p.id == transferForm.value.source_pool_id);
                    if (!source) return 0;
                    return source.current_count;
                });

                const selectedComparisonPools = computed(() => {
                    return selectedComparisonPoolIds.value
                        .map(id => pools.value.find(p => p.id === id))
                        .filter(p => p !== undefined);
                });

                const hasComparisonAlert = computed(() => {
                    return selectedComparisonPools.value.some(pool => isPoolInAlert(pool));
                });

                const axiosInstance = axios.create({
                    baseURL: API_BASE,
                    timeout: 10000
                });

                async function fetchData() {
                    loading.value = true;
                    try {
                        const [poolsRes, summaryRes, maintenanceRes, transfersRes] = await Promise.all([
                            axiosInstance.get('/pools'),
                            axiosInstance.get('/pools/status-summary'),
                            axiosInstance.get('/pools/maintenance'),
                            axiosInstance.get('/transfer-records')
                        ]);
                        pools.value = poolsRes.data;
                        statusSummary.value = summaryRes.data;
                        maintenancePools.value = maintenanceRes.data;
                        transferRecords.value = transfersRes.data;

                        if (selectedPool.value) {
                            const updated = pools.value.find(p => p.id === selectedPool.value.id);
                            if (updated) selectedPool.value = updated;
                        }

                        for (const pool of pools.value) {
                            try {
                                const readingsRes = await axiosInstance.get(`/pools/${pool.id}/oxygen-readings?hours=24`);
                                oxygenReadings.value[pool.id] = readingsRes.data;
                            } catch (e) {
                                oxygenReadings.value[pool.id] = [];
                            }
                        }
                    } catch (error) {
                        console.error('获取数据失败:', error);
                        alert('获取数据失败，请检查后端服务是否正常');
                    } finally {
                        loading.value = false;
                    }
                }

                async function refreshData() {
                    await fetchData();
                    if (selectedPool.value) {
                        await viewPoolDetail(selectedPool.value);
                    }
                }

                function getLatestReading(poolId) {
                    const readings = oxygenReadings.value[poolId] || [];
                    if (readings.length === 0) return null;
                    return readings[readings.length - 1].reading;
                }

                function formatReading(poolId) {
                    const reading = getLatestReading(poolId);
                    return reading === null ? '-' : reading.toFixed(1);
                }

                function getBadgeClass(pool) {
                    if (pool.pump_status === 'maintenance') return 'badge-maintenance';
                    if (pool.is_isolation && pool.isolation_full) return 'badge-full';
                    if (pool.is_isolation) return 'badge-isolation';
                    return 'badge-normal';
                }

                function getPoolStatusText(pool) {
                    if (pool.pump_status === 'maintenance') return '待检修';
                    if (pool.is_isolation && pool.isolation_full) return '隔离已满';
                    if (pool.is_isolation) return '隔离池';
                    return '正常';
                }

                async function viewPoolDetail(pool) {
                    selectedPool.value = pool;
                    try {
                        const [detailRes, readingsRes] = await Promise.all([
                            axiosInstance.get(`/pools/${pool.id}`),
                            axiosInstance.get(`/pools/${pool.id}/oxygen-readings?hours=24`)
                        ]);
                        poolDetail.value = detailRes.data;
                        oxygenReadings.value[pool.id] = readingsRes.data;
                        await nextTick();
                        renderOxygenChart(pool.id);
                    } catch (error) {
                        console.error('获取池详情失败:', error);
                    }
                }

                function renderOxygenChart(poolId) {
                    if (!oxygenChart.value) return;

                    if (chartInstance) {
                        chartInstance.dispose();
                    }

                    const readings = oxygenReadings.value[poolId] || [];
                    const times = readings.map(r => {
                        const dt = new Date(r.recorded_at);
                        return `${dt.getMonth() + 1}/${dt.getDate()} ${dt.getHours().toString().padStart(2, '0')}:00`;
                    });
                    const values = readings.map(r => r.reading);

                    chartInstance = echarts.init(oxygenChart.value);

                    const option = {
                        tooltip: {
                            trigger: 'axis',
                            formatter: '{b}<br/>溶氧: {c} mg/L'
                        },
                        grid: {
                            left: '3%',
                            right: '4%',
                            bottom: '3%',
                            containLabel: true
                        },
                        xAxis: {
                            type: 'category',
                            boundaryGap: false,
                            data: times,
                            axisLabel: {
                                rotate: 45,
                                fontSize: 10
                            }
                        },
                        yAxis: {
                            type: 'value',
                            name: 'mg/L',
                            min: 0,
                            max: 10,
                            axisLabel: {
                                formatter: '{value}'
                            }
                        },
                        series: [{
                            name: '溶氧浓度',
                            type: 'line',
                            smooth: true,
                            data: values,
                            symbol: 'circle',
                            symbolSize: 6,
                            lineStyle: {
                                width: 3,
                                color: {
                                    type: 'linear',
                                    x: 0, y: 0, x2: 1, y2: 0,
                                    colorStops: [
                                        { offset: 0, color: '#667eea' },
                                        { offset: 1, color: '#764ba2' }
                                    ]
                                }
                            },
                            areaStyle: {
                                color: {
                                    type: 'linear',
                                    x: 0, y: 0, x2: 0, y2: 1,
                                    colorStops: [
                                        { offset: 0, color: 'rgba(102, 126, 234, 0.3)' },
                                        { offset: 1, color: 'rgba(102, 126, 234, 0.05)' }
                                    ]
                                }
                            },
                            markLine: {
                                silent: true,
                                data: [{
                                    yAxis: 4,
                                    label: {
                                        formatter: '警戒线 4mg/L',
                                        position: 'end'
                                    },
                                    lineStyle: {
                                        color: '#f5576c',
                                        type: 'dashed',
                                        width: 2
                                    }
                                }]
                            },
                            itemStyle: {
                                color: function(params) {
                                    return params.data < 4 ? '#f5576c' : '#667eea';
                                }
                            }
                        }]
                    };

                    chartInstance.setOption(option);
                }

                function formatDateTime(dtStr) {
                    const dt = new Date(dtStr);
                    return `${dt.getFullYear()}-${(dt.getMonth() + 1).toString().padStart(2, '0')}-${dt.getDate().toString().padStart(2, '0')} ${dt.getHours().toString().padStart(2, '0')}:${dt.getMinutes().toString().padStart(2, '0')}`;
                }

                async function submitTransfer() {
                    submittingTransfer.value = true;
                    transferAlert.value = null;

                    try {
                        const res = await axiosInstance.post('/transfer-records', {
                            source_pool_id: parseInt(transferForm.value.source_pool_id),
                            target_pool_id: parseInt(transferForm.value.target_pool_id),
                            fish_count: transferForm.value.fish_count,
                            reason: transferForm.value.reason
                        });

                        if (res.data.success) {
                            transferAlert.value = { type: 'alert-success', message: res.data.message };
                            setTimeout(() => {
                                showTransferModal.value = false;
                                transferAlert.value = null;
                                resetTransferForm();
                                fetchData().then(() => {
                                    if (currentView.value === 'comparison') {
                                        nextTick(() => {
                                            renderAllComparisonCharts();
                                        });
                                    }
                                });
                            }, 1500);
                        } else {
                            transferAlert.value = { type: 'alert-error', message: res.data.message };
                        }
                    } catch (error) {
                        transferAlert.value = { type: 'alert-error', message: '提交失败，请稍后重试' };
                    } finally {
                        submittingTransfer.value = false;
                    }
                }

                function resetTransferForm() {
                    transferForm.value = {
                        source_pool_id: '',
                        target_pool_id: '',
                        fish_count: 1,
                        reason: '疾病隔离'
                    };
                }

                async function resolveMaintenance() {
                    if (!selectedPool.value) return;
                    try {
                        await axiosInstance.put(`/pools/${selectedPool.value.id}/pump-status?status=normal`);
                        alert('泵状态已更新为正常');
                        await fetchData();
                        if (previousView.value === 'comparison') {
                            backFromDetail();
                        } else {
                            await viewPoolDetail(selectedPool.value);
                        }
                    } catch (error) {
                        console.error('更新状态失败:', error);
                        alert('更新失败，请稍后重试');
                    }
                }

                async function resolveMaintenanceFromList(pool) {
                    try {
                        await axiosInstance.put(`/pools/${pool.id}/pump-status?status=normal`);
                        alert('泵状态已更新为正常');
                        await fetchData();
                        if (currentView.value === 'comparison') {
                            await nextTick();
                            renderAllComparisonCharts();
                        }
                    } catch (error) {
                        console.error('更新状态失败:', error);
                        alert('更新失败，请稍后重试');
                    }
                }

                function switchView(view) {
                    if (currentView.value === 'comparison' && view !== 'comparison') {
                        saveComparisonSelection();
                    }
                    if (view !== 'comparison') {
                        selectedPool.value = null;
                    }
                    currentView.value = view;
                    if (view === 'comparison') {
                        loadComparisonSelection();
                        nextTick(() => {
                            renderAllComparisonCharts();
                        });
                    }
                }

                function toggleComparisonPool(poolId) {
                    const index = selectedComparisonPoolIds.value.indexOf(poolId);
                    if (index > -1) {
                        selectedComparisonPoolIds.value.splice(index, 1);
                    } else if (selectedComparisonPoolIds.value.length < 3) {
                        selectedComparisonPoolIds.value.push(poolId);
                    }
                    saveComparisonSelection();
                    nextTick(() => {
                        renderAllComparisonCharts();
                    });
                }

                function removeFromComparison(poolId) {
                    const index = selectedComparisonPoolIds.value.indexOf(poolId);
                    if (index > -1) {
                        selectedComparisonPoolIds.value.splice(index, 1);
                        saveComparisonSelection();
                        nextTick(() => {
                            renderAllComparisonCharts();
                        });
                    }
                }

                function clearComparisonSelection() {
                    selectedComparisonPoolIds.value = [];
                    saveComparisonSelection();
                    disposeAllComparisonCharts();
                }

                function isPoolInAlert(pool) {
                    if (pool.pump_status === 'maintenance') return true;
                    const latestReading = getLatestReading(pool.id);
                    return latestReading !== null && latestReading < 4;
                }

                function getAlertType(pool) {
                    if (pool.pump_status === 'maintenance') return '待检修';
                    const latestReading = getLatestReading(pool.id);
                    if (latestReading !== null && latestReading < 4) return '溶氧偏低';
                    return '';
                }

                function setComparisonChartRef(poolId, el) {
                    if (el) {
                        comparisonChartRefs.value[poolId] = el;
                    }
                }

                function getSharedTimeAxis() {
                    const allTimes = new Set();
                    for (const poolId of selectedComparisonPoolIds.value) {
                        const readings = oxygenReadings.value[poolId] || [];
                        readings.forEach(r => {
                            const dt = new Date(r.recorded_at);
                            const timeStr = `${dt.getMonth() + 1}/${dt.getDate()} ${dt.getHours().toString().padStart(2, '0')}:00`;
                            allTimes.add(timeStr);
                        });
                    }
                    return Array.from(allTimes).sort();
                }

                function renderComparisonChart(poolId) {
                    const chartRef = comparisonChartRefs.value[poolId];
                    if (!chartRef) return;

                    if (comparisonChartInstances.value[poolId]) {
                        comparisonChartInstances.value[poolId].dispose();
                    }

                    const readings = oxygenReadings.value[poolId] || [];
                    const sharedTimes = getSharedTimeAxis();

                    const readingMap = {};
                    readings.forEach(r => {
                        const dt = new Date(r.recorded_at);
                        const timeStr = `${dt.getMonth() + 1}/${dt.getDate()} ${dt.getHours().toString().padStart(2, '0')}:00`;
                        readingMap[timeStr] = r.reading;
                    });

                    const values = sharedTimes.map(t => readingMap[t] !== undefined ? readingMap[t] : null);

                    const chart = echarts.init(chartRef);
                    comparisonChartInstances.value[poolId] = chart;

                    const colorConfigs = [
                        { main: '#667eea', alpha: 'rgba(102, 126, 234, ' },
                        { main: '#11998e', alpha: 'rgba(17, 153, 142, ' },
                        { main: '#f093fb', alpha: 'rgba(240, 147, 251, ' }
                    ];
                    const colorConfig = colorConfigs[poolId % 3];
                    const color = colorConfig.main;

                    const dataWithAlerts = values.map((v, i) => ({
                        value: v,
                        itemStyle: {
                            color: v !== null && v < 4 ? '#f5576c' : color
                        }
                    }));

                    const option = {
                        tooltip: {
                            trigger: 'axis',
                            formatter: function(params) {
                                const data = params[0];
                                if (data.value === null) return `${data.name}<br/>暂无数据`;
                                const alertClass = data.value < 4 ? 'color: #f5576c;' : '';
                                return `${data.name}<br/><span style="${alertClass}">溶氧: ${data.value} mg/L</span>`;
                            }
                        },
                        grid: {
                            left: '12%',
                            right: '8%',
                            top: '10%',
                            bottom: '15%',
                            containLabel: false
                        },
                        xAxis: {
                            type: 'category',
                            boundaryGap: false,
                            data: sharedTimes,
                            axisLabel: {
                                rotate: 45,
                                fontSize: 9,
                                interval: Math.floor(sharedTimes.length / 6)
                            },
                            axisLine: {
                                lineStyle: {
                                    color: '#ccc'
                                }
                            }
                        },
                        yAxis: {
                            type: 'value',
                            name: 'mg/L',
                            nameTextStyle: {
                                fontSize: 10
                            },
                            min: 0,
                            max: 10,
                            axisLabel: {
                                formatter: '{value}',
                                fontSize: 10
                            },
                            splitLine: {
                                lineStyle: {
                                    color: '#f0f0f0'
                                }
                            }
                        },
                        series: [{
                            name: '溶氧浓度',
                            type: 'line',
                            smooth: true,
                            data: dataWithAlerts,
                            symbol: 'circle',
                            symbolSize: 5,
                            connectNulls: true,
                            lineStyle: {
                                width: 2.5,
                                color: color
                            },
                            areaStyle: {
                                color: {
                                    type: 'linear',
                                    x: 0, y: 0, x2: 0, y2: 1,
                                    colorStops: [
                                        { offset: 0, color: colorConfig.alpha + '0.3)' },
                                        { offset: 1, color: colorConfig.alpha + '0.02)' }
                                    ]
                                }
                            },
                            markLine: {
                                silent: true,
                                symbol: 'none',
                                data: [{
                                    yAxis: 4,
                                    label: {
                                        formatter: '4mg/L',
                                        position: 'insideEndTop',
                                        fontSize: 10,
                                        color: '#f5576c'
                                    },
                                    lineStyle: {
                                        color: '#f5576c',
                                        type: 'dashed',
                                        width: 1.5
                                    }
                                }]
                            },
                            markArea: {
                                silent: true,
                                itemStyle: {
                                    color: 'rgba(245, 87, 108, 0.08)'
                                },
                                data: [[
                                    { yAxis: 0 },
                                    { yAxis: 4 }
                                ]]
                            }
                        }]
                    };

                    chart.setOption(option);
                }

                function renderAllComparisonCharts() {
                    for (const poolId of selectedComparisonPoolIds.value) {
                        setTimeout(() => renderComparisonChart(poolId), 50);
                    }
                }

                function disposeAllComparisonCharts() {
                    for (const poolId in comparisonChartInstances.value) {
                        if (comparisonChartInstances.value[poolId]) {
                            comparisonChartInstances.value[poolId].dispose();
                        }
                    }
                    comparisonChartInstances.value = {};
                }

                function saveComparisonSelection() {
                    try {
                        localStorage.setItem(STORAGE_KEY_COMPARISON, JSON.stringify(selectedComparisonPoolIds.value));
                    } catch (e) {
                        console.warn('保存对比选择失败:', e);
                    }
                }

                function loadComparisonSelection() {
                    try {
                        const saved = localStorage.getItem(STORAGE_KEY_COMPARISON);
                        if (saved) {
                            const ids = JSON.parse(saved);
                            const validIds = ids.filter(id => pools.value.some(p => p.id === id));
                            if (validIds.length >= 2) {
                                selectedComparisonPoolIds.value = validIds;
                            }
                        }
                    } catch (e) {
                        console.warn('恢复对比选择失败:', e);
                    }
                }

                function loadSavedCombinations() {
                    try {
                        const saved = localStorage.getItem(STORAGE_KEY_COMBINATIONS);
                        if (saved) {
                            savedCombinations.value = JSON.parse(saved);
                        }
                    } catch (e) {
                        console.warn('加载保存组合失败:', e);
                    }
                }

                function saveSavedCombinations() {
                    try {
                        localStorage.setItem(STORAGE_KEY_COMBINATIONS, JSON.stringify(savedCombinations.value));
                    } catch (e) {
                        console.warn('保存组合失败:', e);
                    }
                }

                function saveCurrentCombination() {
                    if (selectedComparisonPoolIds.value.length < 2) {
                        alert('请至少选择2个池位');
                        return;
                    }
                    if (savedCombinations.value.length >= maxSavedCombinations) {
                        const overwrite = confirm(`已保存${maxSavedCombinations}组，是否覆盖最早保存的组合？`);
                        if (!overwrite) return;
                        savedCombinations.value.shift();
                    }
                    const name = prompt('请输入组合名称：', `对比组合${savedCombinations.value.length + 1}`);
                    if (!name) return;
                    savedCombinations.value.push({
                        name: name,
                        poolIds: [...selectedComparisonPoolIds.value],
                        createdAt: new Date().toISOString()
                    });
                    saveSavedCombinations();
                }

                function restoreCombination(combo) {
                    const validIds = combo.poolIds.filter(id => pools.value.some(p => p.id === id));
                    if (validIds.length < 2) {
                        alert('该组合中的池位已不存在，无法恢复');
                        return;
                    }
                    selectedComparisonPoolIds.value = validIds;
                    saveComparisonSelection();
                    nextTick(() => {
                        renderAllComparisonCharts();
                    });
                }

                function overwriteCombination(index) {
                    if (selectedComparisonPoolIds.value.length < 2) {
                        alert('请至少选择2个池位才能覆盖');
                        return;
                    }
                    const confirmOverwrite = confirm(`确定要覆盖「${savedCombinations.value[index].name}」吗？`);
                    if (!confirmOverwrite) return;
                    savedCombinations.value[index].poolIds = [...selectedComparisonPoolIds.value];
                    savedCombinations.value[index].updatedAt = new Date().toISOString();
                    saveSavedCombinations();
                }

                function deleteCombination(index) {
                    const confirmDelete = confirm(`确定要删除「${savedCombinations.value[index].name}」吗？`);
                    if (!confirmDelete) return;
                    savedCombinations.value.splice(index, 1);
                    saveSavedCombinations();
                }

                function getCombinationPoolNumbers(combo) {
                    return combo.poolIds
                        .map(id => {
                            const pool = pools.value.find(p => p.id === id);
                            return pool ? pool.pool_number : '未知';
                        })
                        .join('、');
                }

                function viewPoolDetailFromComparison(pool) {
                    previousView.value = 'comparison';
                    viewPoolDetail(pool);
                }

                function backFromDetail() {
                    const prevView = previousView.value;
                    selectedPool.value = null;
                    poolDetail.value = null;
                    if (chartInstance) {
                        chartInstance.dispose();
                        chartInstance = null;
                    }
                    if (prevView === 'comparison') {
                        currentView.value = 'comparison';
                        nextTick(() => {
                            renderAllComparisonCharts();
                        });
                    }
                    previousView.value = 'overview';
                }

                watch(showTransferModal, (val) => {
                    if (!val) {
                        transferAlert.value = null;
                        resetTransferForm();
                    }
                });

                onMounted(() => {
                    loadSavedCombinations();
                    fetchData().then(() => {
                        loadComparisonSelection();
                    });

                    window.addEventListener('resize', () => {
                        if (chartInstance) {
                            chartInstance.resize();
                        }
                        for (const poolId in comparisonChartInstances.value) {
                            if (comparisonChartInstances.value[poolId]) {
                                comparisonChartInstances.value[poolId].resize();
                            }
                        }
                    });
                });

                return {
                    loading,
                    currentView,
                    previousView,
                    pools,
                    statusSummary,
                    maintenancePools,
                    transferRecords,
                    displayPools,
                    isolationPools,
                    availableSourcePools,
                    maxTransferCount,
                    selectedPool,
                    poolDetail,
                    showTransferModal,
                    submittingTransfer,
                    transferAlert,
                    transferForm,
                    oxygenChart,
                    selectedComparisonPoolIds,
                    selectedComparisonPools,
                    savedCombinations,
                    maxSavedCombinations,
                    hasComparisonAlert,
                    getLatestReading,
                    formatReading,
                    getBadgeClass,
                    getPoolStatusText,
                    viewPoolDetail,
                    formatDateTime,
                    submitTransfer,
                    resolveMaintenance,
                    resolveMaintenanceFromList,
                    refreshData,
                    switchView,
                    toggleComparisonPool,
                    removeFromComparison,
                    clearComparisonSelection,
                    isPoolInAlert,
                    getAlertType,
                    setComparisonChartRef,
                    saveCurrentCombination,
                    restoreCombination,
                    overwriteCombination,
                    deleteCombination,
                    getCombinationPoolNumbers,
                    viewPoolDetailFromComparison,
                    backFromDetail
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
